<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonya - UX&UI Designer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Source Han Sans CN', 'Noto Sans SC', sans-serif;
    }

    .container4 {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(262.289deg, rgba(58, 206, 255, 0.043) 0.89424%, rgba(200, 255, 240, 0) 99.395%),
                  linear-gradient(90deg, rgb(250, 254, 255) 0%, rgb(250, 254, 255) 100%);
      padding: 0 100px;
    }

    .content4 {
      display: flex;
      flex-direction: column;
      height: 810px;
      align-items: center;
      justify-content: center;
      max-width: 1440px;
      position: relative;
      flex-shrink: 0;
      width: 100%;
    }

    .huanrao4 {
      position: absolute;
      height: 555.104px;
      left: calc(50% + 0.07px);
      top: calc(50% - 0.45px);
      width: 1012.143px;
      transform: translate(-50%, -50%);
    }

    .huanrao4 img {
      position: absolute;
      display: block;
      inset: 0;
      max-width: none;
      width: 100%;
      height: 100%;
    }

    .flowerlast4 {
      position: absolute;
      height: 714px;
      left: calc(50% + 0.5px);
      top: calc(50% + 3px);
      width: 889px;
      transform: translate(-50%, -50%);
    }

    .flowerlast4 img {
      position: absolute;
      inset: 0;
      max-width: none;
      object-fit: cover;
      pointer-events: none;
      width: 100%;
      height: 100%;
    }

    .bg-circle-4-1 {
      position: absolute;
      height: 619.8px;
      right: -503.2px;
      bottom: -340.8px;
      width: 1264.2px;
    }

    .bg-circle-4-1 img {
      position: absolute;
      inset: -19.36% -9.49%;
      display: block;
      max-width: none;
      width: 100%;
      height: 100%;
    }

    .bg-circle-4-2 {
      position: absolute;
      height: 853.8px;
      left: -135px;
      top: 0;
      width: 676.2px;
    }

    .bg-circle-4-2 img {
      position: absolute;
      inset: -14.05% -17.75%;
      display: block;
      max-width: none;
      width: 100%;
      height: 100%;
    }

    .bg-circle-4-3 {
      position: absolute;
      height: 458.4px;
      left: 0;
      bottom: -232.2px;
      width: 1098px;
    }

    .bg-circle-4-3 img {
      position: absolute;
      inset: -26.18% -10.93%;
      display: block;
      max-width: none;
      width: 100%;
      height: 100%;
    }

    .main-content4 {
      display: flex;
      flex: 1 0 0;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-height: 0;
      padding: 52px 0;
      position: relative;
      width: 100%;
    }

    .footer-row4 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      flex-shrink: 0;
      width: 100%;
    }

    .contact-info4 {
      word-break: break-word;
      font-weight: 500;
      line-height: 0;
      font-style: normal;
      opacity: 0.3;
      position: relative;
      flex-shrink: 0;
      color: #221b3e;
      font-size: 16.8px;
      text-align: justify;
      letter-spacing: 2.856px;
      white-space: nowrap;
    }

    .contact-info4 p {
      line-height: normal;
      margin: 0;
    }

    .sonya-logo4 {
      height: 51px;
      position: relative;
      flex-shrink: 0;
      width: 194px;
    }

    .sonya-logo4 img {
      position: absolute;
      display: block;
      inset: 0;
      max-width: none;
      width: 100%;
      height: 100%;
    }

    .thank-you4 {
      position: absolute;
      height: 79.8px;
      left: calc(50% - 0.47px);
      top: calc(50% - 0.1px);
      width: 785.039px;
      transform: translate(-50%, -50%);
    }

    .thank-you4 img {
      position: absolute;
      display: block;
      inset: 0;
      max-width: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="container4">
    <div class="content4">
      <!-- Huanrao decoration -->
      <div class="huanrao4">
        <img src="image/huanrao.png" alt="">
      </div>

      <!-- Flower decoration -->
      <div class="flowerlast4">
        <img src="image/flowerlast1.png" alt="">
      </div>

      <!-- Background circle 1 -->
      <div class="bg-circle-4-1">
        <img src="image/Ellipsezi.png" alt="">
      </div>

      <!-- Background circle 2 -->
      <div class="bg-circle-4-2">
        <img src="image/Ellipsefen.png" alt="">
      </div>

      <!-- Background circle 3 -->
      <div class="bg-circle-4-3">
        <img src="image/Ellipselv.png" alt="">
      </div>

      <div class="main-content4">
        <!-- Footer row -->
        <div class="footer-row4">
          <div class="contact-info4">
            <p>TEL: 13841299771</p>
            <p>EMAL: sonya9771@163.com</p>
          </div>
          <div class="sonya-logo4">
            <img src="image/sonya2.svg" alt="">
          </div>
        </div>

        <!-- Thank you title -->
        <div class="thank-you4">
          <img src="image/thankyou.png" alt="">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
